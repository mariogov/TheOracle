[domain]
id = "counter_to_grid"
version = "1.0.0"
title = "Counter World to Gridworld Cross-Domain Bridge"
schema_version = 2

[time]
field = { name = "step_index", kind = "i64", required = true, min = 0, max = 1000000 }

[[state.fields]]
name = "abstract_position"
kind = { type = "i64" }
required = true
min = 0
max = 24

[[action.fields]]
name = "abstract_action_kind"
kind = { type = "categorical", variants = ["increment", "decrement", "noop", "lateral", "perpendicular"] }
required = true

[[outcome.fields]]
name = "next_abstract_position"
kind = { type = "i64" }
required = true
min = 0
max = 24

[[entity.fields]]
name = "trajectory_id"
kind = { type = "string" }
required = true

[[entity.fields]]
name = "source_domain"
kind = { type = "categorical", variants = ["counter_world", "gridworld_5x5"] }
required = true

[[instruments]]
id = "abstract_position_scalar"
kind = { type = "scalar" }
input_fields = ["state.abstract_position"]
output_shape = [1]
normalization = { type = "standard_score", mean = 12.0, std = 12.0 }
required = true
pair_kinds = ["cosine"]
version = 1
[instruments.validation]
require_finite = true
reject_nan = true
reject_inf = true
min = 0.0
max = 24.0

[[instruments]]
id = "abstract_action_kind_onehot"
kind = { type = "categorical", variants = ["increment", "decrement", "noop", "lateral", "perpendicular"] }
input_fields = ["action.abstract_action_kind"]
output_shape = [5]
normalization = { type = "none" }
required = true
pair_kinds = ["cosine"]
version = 1
[instruments.validation]
require_finite = true
reject_nan = true
reject_inf = true

[[adapters]]
id = "json_event"
kind = "json_event"
version = 1
[adapters.mapping]
"state.abstract_position" = "$.state.abstract_position"
"action.abstract_action_kind" = "$.action.abstract_action_kind"
"outcome.next_abstract_position" = "$.outcome.next_abstract_position"
"time.step_index" = "$.step"
"entity.trajectory_id" = "$.trajectory_id"
"entity.source_domain" = "$.source_domain"

[[objectives]]
id = "predict_next_abstract_position"
kind = "latent_delta"
input_panel = "state_action"
target = "outcome.next_abstract_position"
loss_weight = 1.0
required_dataset_fields = ["target_panel_id", "input_panel_id", "action_id"]

[[invariants]]
id = "abstract_position_bounds"
expression = "0 <= state.abstract_position AND state.abstract_position <= 24 AND 0 <= outcome.next_abstract_position AND outcome.next_abstract_position <= 24"
severity = "fatal"

[dataset_policy]
default_split = "by_domain_key_hash"
split_key = "entity.trajectory_id"
split_buckets = { train = 0.70, val = 0.20, test = 0.10 }
default_objective = "predict_next_abstract_position"
negative_sampling = "same_domain_different_outcome"
min_negatives_per_row = 1

[planner_policy]
candidate_actions = { kind = "enumerated", moves = ["increment", "decrement", "noop", "lateral", "perpendicular"] }
guards = ["bounds_check"]
surprise_threshold = 0.85

[constellation.global]
modalities = "all"
require_loo_min = 0.85
calibration_percentile = 10
calibration_set_size = 50

[verification_policy]
required_cfs = [
  "dj_domain_packs", "dj_raw_events", "dj_adapter_runs",
  "dj_normalized_states", "dj_actions", "dj_outcomes", "dj_transitions",
  "dj_instrument_readings", "dj_pairwise_readings", "dj_latent_panels",
  "dj_trajectories", "dj_dataset_shards",
  "dj_training_runs", "dj_model_artifacts",
  "dj_predictions", "dj_plan_traces", "dj_guard_decisions",
  "dj_verification_runs", "dj_audit_log", "dj_audit_witness_chain"
]
