[domain]
id = "career_taxonomy"
version = "1.0.0"
title = "Career Taxonomy - Public Occupational Transition Smoke Benchmark"
schema_version = 1

[time]
field = { name = "step_index", kind = "i64", required = true, min = 0, max = 1000000 }

[[state.fields]]
name = "occupation_cluster"
kind = { type = "categorical", variants = ["software", "data", "systems", "management"] }
required = true

[[state.fields]]
name = "job_zone"
kind = { type = "i64" }
required = true
min = 1
max = 5

[[state.fields]]
name = "skill_vector"
kind = { type = "vector", dim = 4 }
required = true
min = 0.0
max = 1.0

[[state.fields]]
name = "experience_years"
kind = { type = "f64" }
required = true
min = 0.0
max = 40.0

[[state.fields]]
name = "wage_band"
kind = { type = "categorical", variants = ["low", "mid", "high"] }
required = true

[[action.fields]]
name = "move"
kind = { type = "categorical", variants = ["skill_gain_adjacent", "skill_gain_high_demand", "role_move_near", "experience_gain", "noop"] }
required = true

[[outcome.fields]]
name = "next_occupation_cluster"
kind = { type = "categorical", variants = ["software", "data", "systems", "management"] }
required = true

[[outcome.fields]]
name = "next_job_zone"
kind = { type = "i64" }
required = true
min = 1
max = 5

[[outcome.fields]]
name = "next_skill_vector"
kind = { type = "vector", dim = 4 }
required = true
min = 0.0
max = 1.0

[[outcome.fields]]
name = "mobility_label"
kind = { type = "categorical", variants = ["same", "near_transition", "far_transition"] }
required = true

[[entity.fields]]
name = "trajectory_id"
kind = { type = "string" }
required = true

[[entity.fields]]
name = "source_dataset"
kind = { type = "string" }
required = true

[[entity.fields]]
name = "source_license"
kind = { type = "string" }
required = true

[[entity.fields]]
name = "source_url"
kind = { type = "string" }
required = true

[[entity.fields]]
name = "source_hash"
kind = { type = "string" }
required = true

[[instruments]]
id = "occupation_cluster_onehot"
kind = { type = "categorical", variants = ["software", "data", "systems", "management"] }
input_fields = ["state.occupation_cluster"]
output_shape = [4]
normalization = { type = "none" }
required = true
pair_kinds = ["cosine"]
version = 1
[instruments.validation]
require_finite = true
reject_nan = true
reject_inf = true

[[instruments]]
id = "job_zone_scalar"
kind = { type = "scalar" }
input_fields = ["state.job_zone"]
output_shape = [1]
normalization = { type = "standard_score", mean = 3.0, std = 2.0 }
required = true
pair_kinds = ["cosine"]
version = 1
[instruments.validation]
require_finite = true
reject_nan = true
reject_inf = true
min = 1.0
max = 5.0

[[instruments]]
id = "skill_vector"
kind = { type = "vector", dim = 4 }
input_fields = ["state.skill_vector"]
output_shape = [4]
normalization = { type = "none" }
required = true
pair_kinds = ["cosine"]
version = 1
[instruments.validation]
require_finite = true
reject_nan = true
reject_inf = true
min = 0.0
max = 1.0

[[instruments]]
id = "experience_scalar"
kind = { type = "scalar" }
input_fields = ["state.experience_years"]
output_shape = [1]
normalization = { type = "standard_score", mean = 10.0, std = 10.0 }
required = true
pair_kinds = ["cosine"]
version = 1
[instruments.validation]
require_finite = true
reject_nan = true
reject_inf = true
min = 0.0
max = 40.0

[[instruments]]
id = "wage_band_onehot"
kind = { type = "categorical", variants = ["low", "mid", "high"] }
input_fields = ["state.wage_band"]
output_shape = [3]
normalization = { type = "none" }
required = true
pair_kinds = ["cosine"]
version = 1
[instruments.validation]
require_finite = true
reject_nan = true
reject_inf = true

[[instruments]]
id = "action_move_onehot"
kind = { type = "categorical", variants = ["skill_gain_adjacent", "skill_gain_high_demand", "role_move_near", "experience_gain", "noop"] }
input_fields = ["action.move"]
output_shape = [5]
normalization = { type = "none" }
required = true
pair_kinds = ["cosine"]
version = 1
[instruments.validation]
require_finite = true
reject_nan = true
reject_inf = true

[[instruments]]
id = "next_occupation_cluster_onehot"
kind = { type = "categorical", variants = ["software", "data", "systems", "management"] }
input_fields = ["outcome.next_occupation_cluster"]
output_shape = [4]
normalization = { type = "none" }
required = true
pair_kinds = ["cosine"]
version = 1
[instruments.validation]
require_finite = true
reject_nan = true
reject_inf = true

[[instruments]]
id = "next_job_zone_scalar"
kind = { type = "scalar" }
input_fields = ["outcome.next_job_zone"]
output_shape = [1]
normalization = { type = "standard_score", mean = 3.0, std = 2.0 }
required = true
pair_kinds = ["cosine"]
version = 1
[instruments.validation]
require_finite = true
reject_nan = true
reject_inf = true
min = 1.0
max = 5.0

[[instruments]]
id = "next_skill_vector"
kind = { type = "vector", dim = 4 }
input_fields = ["outcome.next_skill_vector"]
output_shape = [4]
normalization = { type = "none" }
required = true
pair_kinds = ["cosine"]
version = 1
[instruments.validation]
require_finite = true
reject_nan = true
reject_inf = true
min = 0.0
max = 1.0

[[instruments]]
id = "mobility_label_onehot"
kind = { type = "categorical", variants = ["same", "near_transition", "far_transition"] }
input_fields = ["outcome.mobility_label"]
output_shape = [3]
normalization = { type = "none" }
required = true
pair_kinds = ["cosine"]
version = 1
[instruments.validation]
require_finite = true
reject_nan = true
reject_inf = true

[[adapters]]
id = "json_event"
kind = "json_event"
version = 1
[adapters.mapping]
"state.occupation_cluster" = "$.state.occupation_cluster"
"state.job_zone" = "$.state.job_zone"
"state.skill_vector" = "$.state.skill_vector"
"state.experience_years" = "$.state.experience_years"
"state.wage_band" = "$.state.wage_band"
"action.move" = "$.action.move"
"outcome.next_occupation_cluster" = "$.outcome.next_occupation_cluster"
"outcome.next_job_zone" = "$.outcome.next_job_zone"
"outcome.next_skill_vector" = "$.outcome.next_skill_vector"
"outcome.mobility_label" = "$.outcome.mobility_label"
"time.step_index" = "$.step"
"entity.trajectory_id" = "$.trajectory_id"
"entity.source_dataset" = "$.source.dataset"
"entity.source_license" = "$.source.license"
"entity.source_url" = "$.source.url"
"entity.source_hash" = "$.source.source_hash"

[[objectives]]
id = "predict_next_career_panel"
kind = "latent_delta"
input_panel = "state_action"
target = "outcome.next_skill_vector"
loss_weight = 1.0
required_dataset_fields = ["target_panel_id", "input_panel_id", "action_id"]

[[invariants]]
id = "bounded_public_taxonomy_transition"
expression = "state.job_zone >= 1 AND state.job_zone <= 5 AND outcome.next_job_zone >= 1 AND outcome.next_job_zone <= 5"
severity = "fatal"

[dataset_policy]
default_split = "by_time"
default_objective = "predict_next_career_panel"
negative_sampling = "same_domain_different_outcome"
min_negatives_per_row = 1

[planner_policy]
candidate_actions = { kind = "enumerated", moves = ["skill_gain_adjacent", "skill_gain_high_demand", "role_move_near", "experience_gain", "noop"] }
guards = ["bounds_check"]
surprise_threshold = 0.50

[verification_policy]
required_cfs = [
  "dj_domain_packs", "dj_raw_events", "dj_adapter_runs",
  "dj_normalized_states", "dj_actions", "dj_outcomes", "dj_transitions",
  "dj_instrument_readings", "dj_latent_panels",
  "dj_trajectories", "dj_dataset_shards",
  "dj_training_runs", "dj_model_artifacts",
  "dj_predictions", "dj_plan_traces", "dj_guard_decisions",
  "dj_verification_runs", "dj_audit_log", "dj_audit_witness_chain"
]
expected_trajectory_count = 1
expected_event_count = 15
expected_panel_count = 15
expected_dataset_row_count = 14
expected_train_rows_min = 9
expected_train_rows_max = 9
expected_val_rows_min = 3
expected_val_rows_max = 3
expected_test_rows_min = 2
expected_test_rows_max = 2
