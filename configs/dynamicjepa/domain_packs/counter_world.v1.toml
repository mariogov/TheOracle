[domain]
id = "counter_world"
version = "1.0.0"
title = "Counter World - Deterministic Arithmetic Verification Domain"
schema_version = 1

[time]
field = { name = "ts_ms", kind = "unix_ms", required = true }

[[state.fields]]
name = "counter"
kind = { type = "i64" }
required = true
min = -1024
max = 1024

[[action.fields]]
name = "delta"
kind = { type = "i64" }
required = true
min = -8
max = 8

[[outcome.fields]]
name = "next_counter"
kind = { type = "i64" }
required = true
min = -1024
max = 1024

[entity]
fields = []

[[instruments]]
id = "counter_scalar"
kind = { type = "scalar" }
input_fields = ["state.counter"]
output_shape = [1]
normalization = { type = "standard_score", mean = 0.0, std = 16.0 }
required = true
pair_kinds = ["cosine"]
version = 1
[instruments.validation]
require_finite = true
reject_nan = true
reject_inf = true
min = -64.0
max = 64.0

[[instruments]]
id = "delta_scalar"
kind = { type = "scalar" }
input_fields = ["action.delta"]
output_shape = [1]
normalization = { type = "standard_score", mean = 0.0, std = 4.0 }
required = true
pair_kinds = ["cosine"]
version = 1
[instruments.validation]
require_finite = true
reject_nan = true
reject_inf = true
min = -16.0
max = 16.0

[[adapters]]
id = "json_event"
kind = "json_event"
version = 1
[adapters.mapping]
"state.counter" = "$.state.counter"
"action.delta" = "$.action.delta"
"outcome.next_counter" = "$.outcome.next_counter"
"time.ts_ms" = "$.ts"

[[objectives]]
id = "predict_next_counter"
kind = "latent_delta"
input_panel = "state_action"
target = "outcome.next_counter"
loss_weight = 1.0
required_dataset_fields = ["target_panel_id", "input_panel_id", "action_id"]

[[invariants]]
id = "arithmetic_consistency"
expression = "outcome.next_counter == state.counter + action.delta"
severity = "fatal"

[dataset_policy]
default_split = "by_time"
default_objective = "predict_next_counter"
negative_sampling = "same_domain_different_outcome"
min_negatives_per_row = 1

[planner_policy]
candidate_actions = { kind = "enumerated", deltas = [-2, -1, 0, 1, 2] }
guards = ["bounds_check"]
surprise_threshold = 0.85

[verification_policy]
required_cfs = [
  "dj_domain_packs", "dj_raw_events", "dj_adapter_runs",
  "dj_normalized_states", "dj_actions", "dj_outcomes", "dj_transitions",
  "dj_instrument_readings", "dj_latent_panels",
  "dj_trajectories", "dj_dataset_shards",
  "dj_training_runs", "dj_model_artifacts",
  "dj_predictions", "dj_plan_traces", "dj_guard_decisions",
  "dj_verification_runs", "dj_audit_log", "dj_audit_witness_chain"
]
expected_trajectory_count = 1
expected_event_count = 60
expected_panel_count = 60
expected_dataset_row_count = 59
expected_train_rows_min = 41
expected_train_rows_max = 41
expected_val_rows_min = 12
expected_val_rows_max = 12
expected_test_rows_min = 6
expected_test_rows_max = 6
