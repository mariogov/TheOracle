# TASK-TEST-011 — Phase F weekly load test workflow.
#
# Runs the Phase F load harness on a weekly cron and on manual dispatch.
# Free-plan budget: ubuntu-latest, single 60min timeout.
name: Phase F Load

on:
  schedule:
    # Saturday 05:00 UTC — outside business hours.
    - cron: "0 5 * * 6"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: phase-f-load-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  load:
    name: Phase F load harness
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - name: Cache cargo registry + build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: phase-f-load-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
      - name: cargo build --release -p context-graph-mejepa --tests
        run: cargo build --release -p context-graph-mejepa --tests
      - name: Run available load harness
        run: |
          set -euo pipefail
          if [[ -f crates/context-graph-mejepa/tests/load.rs ]]; then
            cargo test --release -p context-graph-mejepa --test load -- --include-ignored
          else
            echo "Phase F load: no load harness present yet; skipping."
          fi
